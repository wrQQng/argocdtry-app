<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TodoApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --border: #2a2a32;
      --accent: #c8f55a;
      --accent-dim: #9ec43f;
      --text: #f0f0f0;
      --muted: #6b6b7a;
      --done: #3a3a45;
      --red: #ff5a5a;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 40px;
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .stats {
      margin-top: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      padding: 14px 18px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    button.add-btn {
      background: var(--accent);
      color: #0d0d0f;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      border: none;
      padding: 14px 22px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button.add-btn:hover { background: var(--accent-dim); }
    button.add-btn:active { transform: scale(0.97); }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }

    .filter-btn {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--accent);
      color: #0d0d0f;
      border-color: var(--accent);
      font-weight: 700;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover { border-color: #3a3a48; }

    .todo-item.done {
      opacity: 0.5;
      border-color: transparent;
      background: var(--done);
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .todo-item.done .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox svg { display: none; }
    .todo-item.done .checkbox svg { display: block; }

    .todo-title {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .todo-item.done .todo-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-date {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .delete-btn:hover { color: var(--red); background: rgba(255,90,90,0.1); }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      line-height: 2;
    }

    .empty span {
      display: block;
      font-size: 32px;
      margin-bottom: 12px;
    }

    .error-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--red);
      color: white;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 12px 24px;
      border-radius: var(--radius);
      z-index: 100;
      display: none;
    }

    .error-toast.show { display: block; animation: fadeUp 0.3s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="label">// devops practice prilozhenie</div>
      <h1>Todo<span>.</span></h1>
      <div class="stats" id="stats">загрузка...</div>
    </header>

    <div class="input-row">
      <input type="text" id="input" placeholder="NewTask..." maxlength="200" />
      <button class="add-btn" onclick="addTodo()">+ Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">AllV2</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Активные</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Ready</button>
    </div>

    <div class="todo-list" id="list"></div>
  </div>

  <div class="error-toast" id="toast"></div>

  <script>
    const API = '/api/todos';
    let todos = [];
    let filter = 'all';

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function showError(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function updateStats() {
      const total = todos.length;
      const done = todos.filter(t => t.done).length;
      document.getElementById('stats').textContent =
        total === 0 ? 'нет задач' : `${done} / ${total} выполнено`;
    }

    function render() {
      const list = document.getElementById('list');
      let filtered = todos;
      if (filter === 'active') filtered = todos.filter(t => !t.done);
      if (filter === 'done')   filtered = todos.filter(t => t.done);

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><span>✦</span>${
          filter === 'done' ? 'Пока ничего не выполнено' :
          filter === 'active' ? 'Всё сделано!' :
          'Добавь первую задачу'
        }</div>`;
        return;
      }

      list.innerHTML = filtered.map(todo => `
        <div class="todo-item ${todo.done ? 'done' : ''}" id="todo-${todo.id}">
          <div class="checkbox" onclick="toggleTodo(${todo.id})">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5L4.5 8.5L11 1" stroke="#0d0d0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="todo-title">${escapeHtml(todo.title)}</span>
          <span class="todo-date">${formatDate(todo.created_at)}</span>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})" title="Удалить">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadTodos() {
      try {
        const res = await fetch(API);
        todos = await res.json();
        render();
        updateStats();
      } catch {
        showError('Не удалось загрузить задачи');
      }
    }

    async function addTodo() {
      const input = document.getElementById('input');
      const title = input.value.trim();
      if (!title) return input.focus();
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        const todo = await res.json();
        todos.unshift(todo);
        input.value = '';
        render();
        updateStats();
      } catch {
        showError('Ошибка при добавлении');
      }
    }

    async function toggleTodo(id) {
      try {
        const res = await fetch(`${API}/${id}`, { method: 'PATCH' });
        const updated = await res.json();
        todos = todos.map(t => t.id === id ? updated : t);
        render();
        updateStats();
      } catch {
        showError('Ошибка обновления');
      }
    }

    async function deleteTodo(id) {
      try {
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        todos = todos.filter(t => t.id !== id);
        render();
        updateStats();
      } catch {
        showError('Ошибка удаления');
      }
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    loadTodos();
  </script>
</body>
</html>
